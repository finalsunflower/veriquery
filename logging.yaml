# VeriQuery 日志配置

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/veriquery.log
    maxBytes: 52428800  # 50MB
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/veriquery_error.log
    maxBytes: 52428800  # 50MB
    backupCount: 5
    encoding: utf-8

loggers:
  veriquery:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  core:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  ingestion:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  retrieval:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  extraction:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  reasoning:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  agents:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  api:
    level: INFO
    handlers: [console, file]
    propagate: false

  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  uvicorn.access:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console, file, error_file]
